<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsite SE Kabupaten Barru</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a44 0%, #fc6076 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ambient glowing orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }
        
        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.4);
            top: -100px;
            left: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(255, 120, 0, 0.6);
            bottom: -150px;
            right: -100px;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
            100% { transform: translateY(0) scale(1); }
        }

        /* Glassmorphism Container */
        .glass-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 50px 40px;
            width: 90%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15), inset 0 0 0 1px rgba(255,255,255,0.2);
            transform: translateY(30px);
            opacity: 0;
            animation: fadeInUp 1s cubic-bezier(0.23, 1, 0.32, 1) 0.2s forwards;
        }

        @keyframes fadeInUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Animated Title */
        .title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
            line-height: 1.3;
            display: inline-block;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: inline-block;
        }

        .word {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px) scale(0.9);
            animation: wordAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            white-space: pre;
        }

        @keyframes wordAppear {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes wordFloat {
            0%, 100% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-6px); opacity: 1; }
        }

        /* Buttons */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn {
            text-decoration: none;
            color: #ff6a00;
            background: rgba(255, 255, 255, 0.95);
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            width: 100%;
            max-width: 320px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 15px 30px rgba(255, 106, 0, 0.25);
            background: #ffffff;
            color: #ff5e00;
            border: 2px solid rgba(255, 255, 255, 0.6);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .btn svg {
            transition: transform 0.3s ease;
        }

        .btn:hover svg {
            transform: scale(1.1);
        }

        /* Cat Animation Container */
        .cat-container {
            margin: 0 auto 30px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.5), 0 10px 20px rgba(0,0,0,0.1);
            animation: floatCat 4s ease-in-out infinite;
        }

        .cat-emoji {
            font-size: 60px;
            animation: wiggle 2s infinite ease-in-out;
            transform-origin: bottom center;
        }

        @keyframes floatCat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .glass-container {
                padding: 40px 30px;
                width: 95%;
            }
            .title {
                font-size: 1.8rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .btn {
                font-size: 1.05rem;
                padding: 16px 20px;
            }
            .orb-1 {
                width: 300px;
                height: 300px;
            }
            .orb-2 {
                width: 350px;
                height: 350px;
            }
            .cat-container {
                width: 100px;
                height: 100px;
            }
            .cat-emoji {
                font-size: 50px;
            }
        }

        @media (max-width: 480px) {
            .glass-container {
                padding: 35px 20px;
                width: 92%;
                border-radius: 20px;
            }
            .title {
                font-size: 1.5rem;
                margin-bottom: 5px;
            }
            .subtitle {
                font-size: 0.9rem;
                margin-bottom: 30px;
            }
            .btn {
                font-size: 1rem;
                padding: 14px 20px;
                border-radius: 30px;
            }
            .cat-container {
                width: 90px;
                height: 90px;
                margin-bottom: 20px;
            }
            .cat-emoji {
                font-size: 45px;
            }
            .footer-glass {
                font-size: 0.75rem;
                padding: 8px 15px;
                bottom: 15px;
            }
        }

        .footer-glass {
            position: absolute;
            bottom: 25px;
            left: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 10px 25px;
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.5px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            animation: fadeInUpFooter 1s cubic-bezier(0.23, 1, 0.32, 1) 1.2s forwards;
            z-index: 10;
            white-space: nowrap;
        }

        @keyframes fadeInUpFooter {
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* ================= POPUP MODAL VPN ================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 40px 30px;
            width: 90%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25), inset 0 0 0 1px rgba(255,255,255,0.4);
            transform: scale(0.8) translateY(30px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.05);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            color: #555;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: rgba(252, 96, 118, 0.2);
            color: #fc6076;
            transform: rotate(90deg);
        }

        .modal-icon-container {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            cursor: pointer;
            position: relative;
            transition: transform 0.2s ease;
            user-select: none;
        }

        .modal-icon-container:hover {
            transform: scale(1.05);
        }

        .modal-icon-container:active {
            transform: scale(0.95);
        }

        .modal-icon {
            font-size: 50px;
            display: inline-block;
        }

        .modal-title {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff9a44 0%, #fc6076 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .modal-text {
            font-size: 1rem;
            color: #4a4a4a;
            line-height: 1.6;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-direction: column;
        }

        @media (min-width: 480px) {
            .modal-buttons {
                flex-direction: row;
            }
        }

        .modal-btn {
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-decoration: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, #ff9a44 0%, #fc6076 100%);
            color: #fff;
            box-shadow: 0 10px 20px rgba(252, 96, 118, 0.25);
            flex: 1.2;
        }

        .modal-btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(252, 96, 118, 0.35);
        }

        .modal-btn-secondary {
            background: rgba(0, 0, 0, 0.05);
            color: #555;
            border: 1px solid rgba(0, 0, 0, 0.08);
            flex: 0.8;
        }

        .modal-btn-secondary:hover {
            background: rgba(0, 0, 0, 0.08);
            color: #333;
            transform: translateY(-2px);
        }

        /* Floating particle animation */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 1001;
            font-size: 24px;
            animation: particleFloat 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0;
            user-select: none;
        }

        @keyframes particleFloat {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.3);
                opacity: 0;
            }
        }

        /* Cat bounce animation keyframes */
        @keyframes catBounce {
            0% { transform: scale(1); }
            30% { transform: scale(1.3) rotate(-10deg); }
            50% { transform: scale(0.95) rotate(10deg); }
            80% { transform: scale(1.05) rotate(-3deg); }
            100% { transform: scale(1) rotate(0); }
        }

        /* Paw Print Trail & Sparkles */
        .paw-trail {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            font-size: 22px; /* Lebih besar & jelas */
            opacity: 0.95;    /* Sangat jelas di awal */
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            user-select: none;
            text-shadow: 0 2px 10px rgba(255, 106, 0, 0.4); /* Glow tipis hangat */
        }

        /* Mobile Responsive adjustment for Modal */
        @media (max-width: 480px) {
            .modal-content {
                padding: 30px 20px;
                width: 92%;
                border-radius: 24px;
                max-height: 90vh;
                overflow-y: auto;
            }
            .modal-icon-container {
                width: 80px;
                height: 80px;
                margin-bottom: 15px;
            }
            .modal-icon {
                font-size: 40px;
            }
            .modal-title {
                font-size: 1.35rem;
                margin-bottom: 8px;
            }
            .modal-text {
                font-size: 0.9rem;
                line-height: 1.5;
                margin-bottom: 20px;
                padding: 0;
            }
            .modal-btn {
                padding: 12px 20px;
                font-size: 0.9rem;
                width: 100%;
            }
            .modal-buttons {
                flex-direction: column;
                gap: 10px;
            }
            .modal-close {
                top: 15px;
                right: 15px;
                width: 28px;
                height: 28px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="glass-container">
        
        <div class="cat-container" id="main-cat-container" title="Klik aku! 🐾">
            <div class="cat-emoji" id="main-cat-emoji">🐱</div>
        </div>

        <h1 class="title" id="animated-title">Selamat Datang <br> di Microsite SE</h1>
        <p class="subtitle" id="animated-subtitle">BPS Kabupaten Barru for Organik</p>

        <div class="links-container">
            <a href="javascript:void(0)" id="btn-vpn" class="btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Akses Dengan VPN
            </a>
            <a href="https://barru.stat7300.net/dashse/" class="btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l2-9 5 18 3-10h6"></path></svg>
                Akses Tanpa VPN
            </a>
        </div>
    </div>

    <div class="footer-glass">
        created by Tim IT 🧑🏻‍🦱🩵
    </div>

    <!-- Interactive Cute Modal -->
    <div id="vpn-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="close-modal">&times;</button>
            <div class="modal-icon-container" id="modal-icon-trigger">
                <div class="modal-icon" id="modal-emoji">🛠️</div>
            </div>
            <h2 class="modal-title" id="modal-title">Sabar Dulu, Kak! 🚧</h2>
            <p class="modal-text" id="modal-text">
                Halaman akses dengan VPN masih dirakit oleh tim IT kami. Saat ini baru tersedia akses tanpa VPN ya! 🐾
            </p>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" id="btn-close-ok">Oke, Paham</button>
                <a href="https://barru.stat7300.net/dashse/" class="modal-btn modal-btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l2-9 5 18 3-10h6"></path></svg>
                    Akses Tanpa VPN
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const animateText = (elementId, startDelay) => {
                const element = document.getElementById(elementId);
                if (!element) return 0;

                const textLines = element.innerHTML.split(/<br\s*\/?>/i);
                element.innerHTML = "";
                let wordIndex = 0;
                
                textLines.forEach((line, lineIndex) => {
                    const words = line.trim().split(/\s+/);
                    
                    words.forEach((word, index) => {
                        if (word) {
                            const span = document.createElement("span");
                            span.classList.add("word");
                            span.innerText = word + " ";
                            span.style.animationDelay = `${startDelay + (wordIndex * 0.12)}s`;
                            
                            // Transisi ke animasi melayang bergelombang (wave)
                            setTimeout(() => {
                                span.style.animation = `wordFloat 3s ease-in-out infinite`;
                                span.style.animationDelay = `${wordIndex * 0.15}s`;
                            }, (startDelay + (wordIndex * 0.12) + 0.6) * 1000);

                            element.appendChild(span);
                            wordIndex++;
                        }
                    });
                    
                    if (lineIndex < textLines.length -1) {
                        element.appendChild(document.createElement("br"));
                    }
                });

                return wordIndex;
            };

            const titleWordsCount = animateText("animated-title", 0.5);
            animateText("animated-subtitle", 0.5 + (titleWordsCount * 0.12));

            // --- VPN Popup Modal Logic ---
            const btnVpn = document.getElementById("btn-vpn");
            const vpnModal = document.getElementById("vpn-modal");
            const closeModal = document.getElementById("close-modal");
            const btnCloseOk = document.getElementById("btn-close-ok");
            const modalEmoji = document.getElementById("modal-emoji");
            const modalTitle = document.getElementById("modal-title");
            const modalText = document.getElementById("modal-text");
            const iconTrigger = document.getElementById("modal-icon-trigger");

            const funnyMessages = [
                {
                    icon: "🍳🐱",
                    title: "Sedang Dimasak... 🍳",
                    text: "Kabel VPN-nya masih dirakit sama kucing IT kami. Sabar ya, kak! Cobain akses tanpa VPN dulu aja."
                },
                {
                    icon: "😴💻",
                    title: "Developer Capek! 🥱",
                    text: "Programmer kami ketiduran gara-gara kebanyakan begadang ngetik kode. Akses VPN-nya menyusul setelah doi bangun ya!"
                },
                {
                    icon: "🚦🚧",
                    title: "Ups, Macet Total! 🏎️💨",
                    text: "Jalur VPN-nya lagi macet karena diserbu paket internet gaib. Yuk pakai jalur biasa tanpa VPN dulu!"
                },
                {
                    icon: "🧙‍♂️🔮",
                    title: "Mantra Belum Selesai! ✨",
                    text: "Dukun IT kami sedang merapal mantra buat buka gerbang VPN. Harap tunggu ritualnya selesai!"
                },
                {
                    icon: "🚀👩‍🚀",
                    title: "Menuju Tak Terbatas! 🌌",
                    text: "Modul VPN masih terbang di luar angkasa mencari sinyal. Sembari menunggu mendarat, pake akses tanpa VPN dulu yuk!"
                }
            ];

            const showVpnModal = () => {
                // Pick a random funny message
                const randomMsg = funnyMessages[Math.floor(Math.random() * funnyMessages.length)];
                modalEmoji.innerText = randomMsg.icon;
                modalTitle.innerText = randomMsg.title;
                modalText.innerHTML = randomMsg.text;
                
                vpnModal.classList.add("active");
            };

            const hideVpnModal = () => {
                vpnModal.classList.remove("active");
            };

            // Particles Burst Animation
            const createParticles = (x, y) => {
                const emojis = ["🐾", "🛠️", "✨", "🔥", "🐱", "💻", "☕", "🚧", "🚀", "💡"];
                const container = document.body;
                
                for (let i = 0; i < 12; i++) {
                    const particle = document.createElement("div");
                    particle.className = "particle";
                    particle.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 50 + Math.random() * 80;
                    const dx = Math.cos(angle) * velocity;
                    const dy = Math.sin(angle) * velocity;
                    
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    particle.style.setProperty("--dx", `${dx}px`);
                    particle.style.setProperty("--dy", `${dy}px`);
                    
                    container.appendChild(particle);
                    
                    setTimeout(() => {
                        particle.remove();
                    }, 1200);
                }
            };

            btnVpn.addEventListener("click", (e) => {
                e.preventDefault();
                createParticles(e.pageX, e.pageY);
                showVpnModal();
            });

            closeModal.addEventListener("click", hideVpnModal);
            btnCloseOk.addEventListener("click", hideVpnModal);
            
            // Close when clicking overlay backdrop
            vpnModal.addEventListener("click", (e) => {
                if (e.target === vpnModal) {
                    hideVpnModal();
                }
            });

            // Trigger particles when clicking the modal's central icon container
            iconTrigger.addEventListener("click", (e) => {
                const rect = iconTrigger.getBoundingClientRect();
                const x = rect.left + rect.width / 2 + window.scrollX;
                const y = rect.top + rect.height / 2 + window.scrollY;
                createParticles(x, y);
                
                // Add temporary bounce effect on the icon
                modalEmoji.style.transform = "scale(1.3) rotate(15deg)";
                setTimeout(() => {
                    modalEmoji.style.transform = "scale(1) rotate(0deg)";
                }, 200);
            });

            // --- Main Cat Interaction ---
            const mainCatContainer = document.getElementById("main-cat-container");
            const mainCatEmoji = document.getElementById("main-cat-emoji");
            const catEmojis = ["😺", "😸", "😻", "😽", "😼", "🙀", "😹", "🐯", "🦁"];
            
            mainCatContainer.style.cursor = "pointer";
            
            mainCatContainer.addEventListener("click", (e) => {
                const rect = mainCatContainer.getBoundingClientRect();
                const x = rect.left + rect.width / 2 + window.scrollX;
                const y = rect.top + rect.height / 2 + window.scrollY;
                
                // Burst cute emojis
                const items = ["🐾", "🐟", "🐟", "✨", "❤️", "🧶", "🐈", "🍼"];
                for (let i = 0; i < 10; i++) {
                    const particle = document.createElement("div");
                    particle.className = "particle";
                    particle.innerText = items[Math.floor(Math.random() * items.length)];
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 40 + Math.random() * 60;
                    const dx = Math.cos(angle) * velocity;
                    const dy = Math.sin(angle) * velocity;
                    
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    particle.style.setProperty("--dx", `${dx}px`);
                    particle.style.setProperty("--dy", `${dy}px`);
                    
                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 1200);
                }
                
                // Change emoji
                const currentEmoji = mainCatEmoji.innerText;
                let nextEmoji = catEmojis[Math.floor(Math.random() * catEmojis.length)];
                while (nextEmoji === currentEmoji) {
                    nextEmoji = catEmojis[Math.floor(Math.random() * catEmojis.length)];
                }
                mainCatEmoji.innerText = nextEmoji;
                
                // Bounce animation
                mainCatContainer.style.animation = "none";
                void mainCatContainer.offsetWidth; // Trigger reflow
                mainCatContainer.style.animation = "floatCat 4s ease-in-out infinite, catBounce 0.6s cubic-bezier(0.25, 1.5, 0.5, 1)";
            });
            
            // Hover reactions
            mainCatContainer.style.transition = "transform 0.2s ease";
            mainCatContainer.addEventListener("mouseenter", () => {
                if (mainCatEmoji.innerText === "🐱") {
                    mainCatEmoji.innerText = "😺";
                }
            });
            
            mainCatContainer.addEventListener("mouseleave", () => {
                if (mainCatEmoji.innerText === "😺") {
                    mainCatEmoji.innerText = "🐱";
                }
            });

            // --- Mouse & Touch Paw/Sparkle Trail ---
            let lastX = 0;
            let lastY = 0;
            const minDistance = 25; // Jarak minimal antar jejak

            const trailItems = ["🐾", "🐾", "✨", "❤️", "🫧", "🐱", "🐾", "✨", "🌟"];

            const spawnTrail = (x, y) => {
                const dist = Math.hypot(x - lastX, y - lastY);
                if (dist < minDistance) return;

                lastX = x;
                lastY = y;

                const paw = document.createElement("div");
                paw.className = "paw-trail";
                paw.innerText = trailItems[Math.floor(Math.random() * trailItems.length)];
                paw.style.left = `${x}px`;
                paw.style.top = `${y}px`;
                
                const rotate = (Math.random() - 0.5) * 45;
                const scale = 0.6 + Math.random() * 0.6;
                paw.style.transform = `translate(-50%, -50%) rotate(${rotate}deg) scale(${scale})`;
                
                document.body.appendChild(paw);

                // Efek melayang naik dan memudar
                setTimeout(() => {
                    const driftY = -15 - Math.random() * 25;
                    const driftX = (Math.random() - 0.5) * 20;
                    paw.style.opacity = "0";
                    paw.style.transform = `translate(calc(-50% + ${driftX}px), calc(-50% + ${driftY}px)) rotate(${rotate + (Math.random() - 0.5) * 60}deg) scale(0.2)`;
                }, 50);

                setTimeout(() => {
                    paw.remove();
                }, 650);
            };

            // Mouse moves on PC
            document.addEventListener("mousemove", (e) => {
                spawnTrail(e.pageX, e.pageY);
            });

            // Touch dragging on mobile
            document.addEventListener("touchmove", (e) => {
                if (e.touches && e.touches[0]) {
                    spawnTrail(e.touches[0].pageX, e.touches[0].pageY);
                }
            }, { passive: true });
        });
    </script>
</body>
</html>
