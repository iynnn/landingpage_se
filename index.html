<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsite SE Kabupaten Barru</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a44 0%, #fc6076 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ambient glowing orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }
        
        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.4);
            top: -100px;
            left: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(255, 120, 0, 0.6);
            bottom: -150px;
            right: -100px;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
            100% { transform: translateY(0) scale(1); }
        }

        /* Glassmorphism Container */
        .glass-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 50px 40px;
            width: 90%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15), inset 0 0 0 1px rgba(255,255,255,0.2);
            transform: translateY(30px);
            opacity: 0;
            animation: fadeInUp 1s cubic-bezier(0.23, 1, 0.32, 1) 0.2s forwards;
        }

        @keyframes fadeInUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Animated Title */
        .title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
            line-height: 1.3;
            display: inline-block;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: inline-block;
        }

        .word {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px) scale(0.9);
            animation: wordAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            white-space: pre;
        }

        @keyframes wordAppear {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes wordFloat {
            0%, 100% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-6px); opacity: 1; }
        }

        /* Buttons */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn {
            text-decoration: none;
            color: #ff6a00;
            background: rgba(255, 255, 255, 0.95);
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            width: 100%;
            max-width: 320px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 15px 30px rgba(255, 106, 0, 0.25);
            background: #ffffff;
            color: #ff5e00;
            border: 2px solid rgba(255, 255, 255, 0.6);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .btn svg {
            transition: transform 0.3s ease;
        }

        .btn:hover svg {
            transform: scale(1.1);
        }

        /* Cat Animation Container */
        .cat-container {
            margin: 0 auto 30px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.5), 0 10px 20px rgba(0,0,0,0.1);
            animation: floatCat 4s ease-in-out infinite;
        }

        .cat-emoji {
            font-size: 60px;
            animation: wiggle 2s infinite ease-in-out;
            transform-origin: bottom center;
        }

        @keyframes floatCat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .glass-container {
                padding: 40px 30px;
                width: 95%;
            }
            .title {
                font-size: 1.8rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .btn {
                font-size: 1.05rem;
                padding: 16px 20px;
            }
            .orb-1 {
                width: 300px;
                height: 300px;
            }
            .orb-2 {
                width: 350px;
                height: 350px;
            }
            .cat-container {
                width: 100px;
                height: 100px;
            }
            .cat-emoji {
                font-size: 50px;
            }
        }

        @media (max-width: 480px) {
            .glass-container {
                padding: 35px 20px;
                width: 92%;
                border-radius: 20px;
            }
            .title {
                font-size: 1.5rem;
                margin-bottom: 5px;
            }
            .subtitle {
                font-size: 0.9rem;
                margin-bottom: 30px;
            }
            .btn {
                font-size: 1rem;
                padding: 14px 20px;
                border-radius: 30px;
            }
            .cat-container {
                width: 90px;
                height: 90px;
                margin-bottom: 20px;
            }
            .cat-emoji {
                font-size: 45px;
            }
            .footer-glass {
                font-size: 0.75rem;
                padding: 8px 15px;
                bottom: 15px;
            }
        }

        .footer-glass {
            position: absolute;
            bottom: 25px;
            left: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 10px 25px;
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.5px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            animation: fadeInUpFooter 1s cubic-bezier(0.23, 1, 0.32, 1) 1.2s forwards;
            z-index: 10;
            white-space: nowrap;
        }

        @keyframes fadeInUpFooter {
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="glass-container">
        
        <div class="cat-container">
            <div class="cat-emoji">🐱</div>
        </div>

        <h1 class="title" id="animated-title">Selamat Datang <br> di Microsite SE</h1>
        <p class="subtitle" id="animated-subtitle">BPS Kabupaten Barru for Organik</p>

        <div class="links-container">
            <a href="#" class="btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Akses Dengan VPN
            </a>
            <a href="https://barru.stat7300.net/dashse/" class="btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l2-9 5 18 3-10h6"></path></svg>
                Akses Tanpa VPN
            </a>
        </div>
    </div>

    <div class="footer-glass">
        created by Tim IT 🧑🏻‍🦱🩵
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const animateText = (elementId, startDelay) => {
                const element = document.getElementById(elementId);
                if (!element) return 0;

                const textLines = element.innerHTML.split(/<br\s*\/?>/i);
                element.innerHTML = "";
                let wordIndex = 0;
                
                textLines.forEach((line, lineIndex) => {
                    const words = line.trim().split(/\s+/);
                    
                    words.forEach((word, index) => {
                        if (word) {
                            const span = document.createElement("span");
                            span.classList.add("word");
                            span.innerText = word + " ";
                            span.style.animationDelay = `${startDelay + (wordIndex * 0.12)}s`;
                            
                            // Transisi ke animasi melayang bergelombang (wave)
                            setTimeout(() => {
                                span.style.animation = `wordFloat 3s ease-in-out infinite`;
                                span.style.animationDelay = `${wordIndex * 0.15}s`;
                            }, (startDelay + (wordIndex * 0.12) + 0.6) * 1000);

                            element.appendChild(span);
                            wordIndex++;
                        }
                    });
                    
                    if (lineIndex < textLines.length -1) {
                        element.appendChild(document.createElement("br"));
                    }
                });

                return wordIndex;
            };

            const titleWordsCount = animateText("animated-title", 0.5);
            animateText("animated-subtitle", 0.5 + (titleWordsCount * 0.12));
        });
    </script>
</body>
</html>
